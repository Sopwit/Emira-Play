name: Repository CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repo:
    name: Audit, smoke, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install root workspace dependencies
        run: npm ci

      - name: Run public repo audit
        run: npm run audit:public

      - name: Run backend smoke checks
        run: npm run ci:backend

      - name: Lint and build frontend
        run: npm run ci:frontend
