services:
  postgres:
    image: postgres:16-alpine
    container_name: emira-postgres
    environment:
      POSTGRES_DB: emira_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: node:20-alpine
    container_name: emira-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: ["node", "src/server.mjs"]
    ports:
      - "8081:8080"
    environment:
      PORT: 8080
      STELLAR_NETWORK: testnet
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      POSTGRES_URL: postgres://postgres:postgres@postgres:5432/emira_core
    restart: unless-stopped
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BASE_PATH: /
        VITE_API_BASE_URL: http://localhost:8081
    container_name: emira-frontend
    ports:
      - "5173:80"
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: http://backend:8080
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
